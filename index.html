<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>The Band</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(135deg, #000000, #3b0a0a);
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 18px;
      opacity: 0.8;
    }

    section {
      padding: 40px 20px;
      max-width: 700px;
      margin: auto;
    }

    h2 {
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <header>
    <h1>The Band</h1>
    <p class="tagline">Som, intensidade e identidade.</p>
  </header>

  <section>
    <h2>Sobre</h2>
    <p>
      The Band mistura energia crua com melodias marcantes.
      Cada faixa é construída pra ser sentida — não só ouvida.
    </p>
  </section>

  <section>
    <h2>Músicas</h2>
    <p>Em breve nas plataformas.</p>
  </section>

  <section>
    <h2>Contato</h2>
    <p>@theband</p>
  </section>

  <footer>
    © 2026 The Band
  </footer>

</body>
</html>
